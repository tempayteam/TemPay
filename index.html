  <!-- Start Single Page Apps for GitHub Pages -->
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // https://github.com/rafgraph/spa-github-pages
    // This script checks to see if a redirect is present in the query string,
    // converts it back into a correct url and adds it to the
    // browser's history using window.history.replaceState(...),
    // which causes the browser to load the correct page without a page refresh.
    (function(l) {
      if (l.search[1] === 'p' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&') 
        }).filter(function(s) {
          return s.slice(0, 2) === 'p='
        })[0].slice(2);
        if (decoded !== l.pathname) {
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + (l.search.slice(1).split('&').filter(function(s) {
              return s.slice(0, 2) !== 'p='
            }).join('&').slice(0, 1) === '?' ? l.search.slice(1).split('&').filter(function(s) {
              return s.slice(0, 2) !== 'p='
            }).join('&') : (l.search.slice(1).split('&').filter(function(s) {
              return s.slice(0, 2) !== 'p='
            }).join('&').length > 0 ? '?' + l.search.slice(1).split('&').filter(function(s) {
              return s.slice(0, 2) !== 'p='
            }).join('&') : '')) + l.hash
          );
        }
      }
    }(window.location))
  </script>
